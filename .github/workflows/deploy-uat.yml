name: Deploy UAT (Firebase Hosting)

# Pushing to the uat branch ships the staging web build to the
# Sawad-Loan-Universal-UAT Firebase Hosting site.
on:
  push:
    branches: [uat]
  workflow_dispatch: {}

concurrency:
  group: deploy-uat
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: uat
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.38.5
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web (uat)
        # WEB_VERSION = monotonic CI run number, logged on boot to spot stale
        # cached builds (see lib/config/app_environment.dart).
        run: flutter build web --release --pwa-strategy=none --dart-define=ENV=uat --dart-define=WEB_VERSION=${{ github.run_number }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@13

      - name: Deploy to Firebase Hosting (uat)
        run: firebase deploy --only hosting -P uat --token "$FIREBASE_TOKEN" --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
